<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מערכת דיאגנוסטיקה לרכבים</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pri:#2563eb;--pri-d:#1d4ed8;--pri-l:#dbeafe;
  --red:#dc2626;--red-l:#fee2e2;--org:#f97316;
  --yel:#f59e0b;--yel-l:#fef3c7;
  --grn:#16a34a;--grn-l:#dcfce7;
  --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;
  --g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g700:#374151;--g800:#1f2937;
  --r:12px;--sh:0 1px 3px rgba(0,0,0,.1);--sh2:0 10px 15px -3px rgba(0,0,0,.1);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--g50);color:var(--g800);min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:20px}
.hdr{background:linear-gradient(135deg,var(--pri),var(--pri-d));color:#fff;padding:24px 32px;border-radius:var(--r);margin-bottom:24px;text-align:center}
.hdr h1{font-size:1.8rem;margin-bottom:6px}.hdr p{opacity:.85;font-size:.95rem}
.steps{display:flex;justify-content:center;gap:4px;margin-bottom:24px;direction:ltr}
.sd{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;background:var(--g200);color:var(--g500);transition:.3s}
.sd.on{background:var(--pri);color:#fff;box-shadow:0 0 0 4px var(--pri-l)}.sd.done{background:var(--grn);color:#fff}
.sc{width:36px;height:2px;background:var(--g200);align-self:center}.sc.done{background:var(--grn)}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:28px;margin-bottom:20px}
.ct{font-size:1.15rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{padding:10px 20px;border:2px solid var(--g200);border-radius:8px;background:#fff;cursor:pointer;font-weight:600;font-size:.9rem;transition:.2s}
.tab.on{background:var(--pri);color:#fff;border-color:var(--pri)}.tab:hover:not(.on){border-color:var(--pri);color:var(--pri)}
label{display:block;font-weight:600;margin-bottom:6px;font-size:.9rem;color:var(--g600)}
input,select{width:100%;padding:10px 14px;border:1.5px solid var(--g300);border-radius:8px;font-size:1rem;font-family:inherit;transition:.2s;background:#fff}
input:focus,select:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-l)}
.row{display:flex;gap:12px}.row>*{flex:1}
.btn{padding:12px 24px;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit}
.btn-p{background:var(--pri);color:#fff}.btn-p:hover{background:var(--pri-d)}.btn-p:disabled{background:var(--g300);cursor:not-allowed}
.btn-s{background:var(--g100);color:var(--g700);border:1.5px solid var(--g300)}.btn-s:hover{background:var(--g200)}
.btns{display:flex;gap:12px;margin-top:20px}
.pi input{font-size:1.4rem;text-align:center;letter-spacing:2px;font-weight:700;direction:ltr;padding:12px}
.piw{display:flex;gap:12px;align-items:flex-end}
.pr{padding:16px;background:var(--pri-l);border-radius:8px;margin-top:12px}.pr .f{display:flex;gap:8px;padding:3px 0}.pr .fl{font-weight:600;color:var(--g600);min-width:100px}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
.sc2{padding:16px;border:2px solid var(--g200);border-radius:10px;text-align:center;cursor:pointer;transition:.2s}
.sc2:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:var(--sh)}.sc2.sel{border-color:var(--pri);background:var(--pri-l)}
.sc2 .ic{font-size:2rem;margin-bottom:4px}.sc2 .nm{font-weight:600;font-size:.85rem}.sc2 .cn{font-size:.75rem;color:var(--g500);margin-top:3px}
.il{display:flex;flex-direction:column;gap:8px}
.ii{padding:14px 16px;border:1.5px solid var(--g200);border-radius:8px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:12px}
.ii:hover{border-color:var(--pri);background:var(--g50)}.ii.sel{border-color:var(--pri);background:var(--pri-l)}
.in{width:28px;height:28px;border-radius:50%;background:var(--g200);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0}
.ii.sel .in{background:var(--pri);color:#fff}
.sq{background:var(--yel-l);border:2px solid var(--yel);border-radius:10px;padding:18px;font-weight:600;font-size:1.05rem;text-align:center;margin:16px 0}
.sb{display:flex;gap:16px;margin-top:12px}
.sb>div{flex:1}
.sby,.sbn{width:100%;padding:12px;border:2px solid var(--g200);border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s;background:#fff}
.sby{color:var(--grn);border-color:var(--grn-l)}.sby:hover{background:var(--grn);color:#fff}
.sbn{color:var(--red);border-color:var(--red-l)}.sbn:hover{background:var(--red);color:#fff}
.dc{border-radius:var(--r);padding:24px;margin-top:16px}
.dc.critical{background:#fef2f2;border:2px solid var(--red)}.dc.high{background:#fff7ed;border:2px solid var(--org)}
.dc.medium{background:var(--yel-l);border:2px solid var(--yel)}.dc.low{background:var(--grn-l);border:2px solid var(--grn)}
.dt{font-size:1.1rem;font-weight:700;margin-bottom:12px}
.ds{margin-bottom:12px}.ds h4{font-size:.85rem;color:var(--g500);margin-bottom:4px}
.ub{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:700}
.ub.critical{background:var(--red);color:#fff}.ub.high{background:var(--org);color:#fff}
.ub.medium{background:var(--yel);color:#fff}.ub.low{background:var(--grn);color:#fff}
.pl{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.pt{background:#fff;border:1px solid var(--g300);padding:4px 10px;border-radius:20px;font-size:.85rem}
.acw{position:relative}.acl{position:absolute;top:100%;right:0;left:0;background:#fff;border:1.5px solid var(--g300);border-top:none;border-radius:0 0 8px 8px;max-height:250px;overflow-y:auto;z-index:100;box-shadow:var(--sh2)}
.aci{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px}.aci:hover{background:var(--g50)}
.aci .sb2{font-size:.75rem;background:var(--pri-l);color:var(--pri);padding:2px 8px;border-radius:4px}
.alert{padding:14px 18px;border-radius:8px;margin-bottom:16px;font-size:.95rem}
.alert-e{background:var(--red-l);color:var(--red);border:1px solid var(--red)}
.alert-i{background:var(--pri-l);color:var(--pri)}.alert-s{background:var(--grn-l);color:var(--grn)}
.ld{text-align:center;padding:40px;color:var(--g500)}
.spin{display:inline-block;width:32px;height:32px;border:3px solid var(--g200);border-top-color:var(--pri);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.crumb{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.cb{padding:4px 10px;background:var(--g100);border-radius:6px;font-size:.8rem;display:flex;align-items:center;gap:4px}
.cb .a{font-weight:700}.cb .a.y{color:var(--grn)}.cb .a.n{color:var(--red)}
.cr{display:flex;align-items:center;gap:8px;margin-top:4px}
.crb{flex:1;height:8px;background:var(--g200);border-radius:4px;overflow:hidden}
.crf{height:100%;background:linear-gradient(90deg,var(--grn),var(--yel),var(--red));border-radius:4px}
.smr{margin-top:24px;padding:20px;background:var(--g50);border-radius:10px;border:1px solid var(--g200)}
.smr td{padding:6px 0}.smr .lbl{font-weight:600;width:120px}
.hid{display:none!important}
.fi{animation:fi .3s ease}@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){.row{flex-direction:column}.sg{grid-template-columns:repeat(2,1fr)}.sb{flex-direction:column}.steps{gap:2px}.sd{width:36px;height:36px;font-size:.8rem}.sc{width:20px}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="hdr">
    <h1>מערכת דיאגנוסטיקה לרכבים</h1>
    <p>זיהוי תקלות, אבחון מונחה ופתרונות מקצועיים</p>
  </div>
  <div class="steps" id="steps-bar"></div>

  <!-- Step 1 -->
  <div id="step-1" class="card fi">
    <div class="ct">שלב 1 — זיהוי רכב</div>
    <div class="tabs">
      <div class="tab on" onclick="switchMode('plate')">לוחית רישוי</div>
      <div class="tab" onclick="switchMode('manual')">הזנה ידנית</div>
    </div>
    <div id="plate-mode">
      <label>מספר רישוי</label>
      <div class="piw">
        <div class="pi" style="flex:1"><input type="text" id="plate-num" placeholder="12-345-67" maxlength="10" oninput="fmtPlate(this)" onkeydown="if(event.key==='Enter')lookupPlate()"></div>
        <button class="btn btn-p" onclick="lookupPlate()" id="btn-lu">חפש</button>
      </div>
      <div id="plate-res" class="hid"></div>
    </div>
    <div id="manual-mode" class="hid">
      <div class="row">
        <div><label>יצרן</label><select id="s-make" onchange="onMake()"><option value="">בחר יצרן...</option></select></div>
        <div><label>דגם</label><select id="s-model" onchange="onModel()" disabled><option value="">בחר דגם...</option></select></div>
        <div><label>שנה</label><select id="s-year" onchange="onYear()" disabled><option value="">בחר שנה...</option></select></div>
      </div>
    </div>
    <div class="btns"><button class="btn btn-p" onclick="goStep2()" id="btn1" disabled>המשך לשלב הבא</button></div>
  </div>

  <!-- Step 2 -->
  <div id="step-2" class="card hid">
    <div class="ct">שלב 2 — תיאור התקלה</div>
    <div id="v-sum"></div>
    <div><label>תאר את הבעיה (או בחר מהרשימה)</label>
      <div class="acw"><input type="text" id="iss-q" placeholder="לדוגמה: רעש בבלמים, דליפת שמן..." oninput="onSearch()" onfocus="onSearch()"><div class="acl hid" id="ac-list"></div></div>
    </div>
    <div style="margin-top:16px"><div class="ct" style="font-size:1rem">או בחר מערכת:</div><div class="sg" id="sys-grid"></div></div>
    <div id="iss-sec" class="hid" style="margin-top:16px"><div class="ct" style="font-size:1rem" id="iss-t">בעיות שכיחות:</div><div class="il" id="iss-list"></div></div>
    <div class="btns"><button class="btn btn-s" onclick="goStep(1)">חזרה</button><button class="btn btn-p" onclick="goStep3()" id="btn2" disabled>התחל אבחון</button></div>
  </div>

  <!-- Step 3 -->
  <div id="step-3" class="card hid">
    <div class="ct">שלב 3 — אבחון מונחה (SOP)</div>
    <div id="sop-info"></div>
    <div class="crumb" id="sop-hist"></div>
    <div id="sop-tree"></div>
    <div class="btns"><button class="btn btn-s" onclick="goStep(2)">חזרה</button><button class="btn btn-s" onclick="resetSop()">התחל SOP מחדש</button></div>
  </div>

  <!-- Step 4 -->
  <div id="step-4" class="card hid">
    <div class="ct">שלב 4 — תוצאות אבחון</div>
    <div id="diag-res"></div>
    <div class="btns"><button class="btn btn-s" onclick="goStep(3)">חזרה ל-SOP</button><button class="btn btn-p" onclick="goStep5()">צפה בפתרון מלא</button></div>
  </div>

  <!-- Step 5 -->
  <div id="step-5" class="card hid">
    <div class="ct">שלב 5 — פתרון מפורט</div>
    <div id="sol-det"></div>
    <div class="btns"><button class="btn btn-s" onclick="goStep(1)">אבחון חדש</button><button class="btn btn-p" onclick="window.print()">הדפס סיכום</button></div>
  </div>

  <div id="loading" class="ld hid"><div class="spin"></div><p style="margin-top:12px">טוען נתוני רכבים...</p></div>
</div>

<script>
// ── Data & State ───────────────────────────────────────────────────────────
let DB = null; // { MAKE: { Model: { "2020": { engine:[...], ... }}}}
const S = { step:1, mode:'plate', vehicle:null, systems:null, selSys:null, selIssue:null, selIdx:null, sop:null, sopPath:[], sopCur:null, diag:null };

const SYS_INFO = {
  engine:{he:'מערכת המנוע',ic:'🔧'}, cooling:{he:'מערכת קירור',ic:'❄️'},
  electrical:{he:'מערכת חשמל',ic:'⚡'}, fuel:{he:'מערכת דלק',ic:'⛽'},
  exhaust:{he:'פליטה (אגזוז)',ic:'💨'}, transmission:{he:'מערכת הילוכים',ic:'⚙️'},
  suspension:{he:'מערכת מתלים',ic:'🔩'}, steering:{he:'מערכת היגוי',ic:'🎯'},
  brakes:{he:'מערכת בלמים',ic:'🛑'}, electronics:{he:'אלקטרוניקה',ic:'📟'}
};
const SYS_ORDER = Object.keys(SYS_INFO);
const URG_HE = { critical:'קריטי — טפל מיד!', high:'גבוה — טפל בהקדם', medium:'בינוני', low:'נמוך — עקוב' };

// ── Init ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  renderSteps();
  document.addEventListener('click', e => { if(!e.target.closest('.acw')) $('ac-list').classList.add('hid'); });
  // Load DB
  $('loading').classList.remove('hid');
  try {
    const r = await fetch('/vehicle_db.json');
    DB = await r.json();
    populateMakes();
    $('loading').classList.add('hid');
  } catch(e) {
    $('loading').innerHTML = '<div class="alert alert-e">שגיאה בטעינת מסד נתונים: ' + e.message + '</div>';
  }
});

const $ = id => document.getElementById(id);

// ── Steps ──────────────────────────────────────────────────────────────────
function renderSteps() {
  const b = $('steps-bar'); b.innerHTML = '';
  for(let i=1;i<=5;i++){
    if(i>1){const c=document.createElement('div');c.className='sc'+(i<=S.step?' done':'');b.appendChild(c);}
    const d=document.createElement('div');d.className='sd'+(i===S.step?' on':i<S.step?' done':'');
    d.textContent=i<S.step?'✓':i;b.appendChild(d);
  }
}
function goStep(n){for(let i=1;i<=5;i++)$('step-'+i).classList.toggle('hid',i!==n);S.step=n;renderSteps();window.scrollTo({top:0,behavior:'smooth'});}

// ── Step 1 ─────────────────────────────────────────────────────────────────
function switchMode(m){
  S.mode=m;
  $('plate-mode').classList.toggle('hid',m!=='plate');
  $('manual-mode').classList.toggle('hid',m!=='manual');
  document.querySelectorAll('.tabs .tab').forEach((t,i)=>t.classList.toggle('on',i===(m==='plate'?0:1)));
  chk1();
}
function fmtPlate(el){
  let v=el.value.replace(/\D/g,'');if(v.length>8)v=v.slice(0,8);
  if(v.length>=6)el.value=v.slice(0,2)+'-'+v.slice(2,5)+'-'+v.slice(5);
  else if(v.length>=3)el.value=v.slice(0,2)+'-'+v.slice(2);else el.value=v;chk1();
}
async function lookupPlate(){
  const p=$('plate-num').value.replace(/\D/g,'');if(p.length<5)return;
  const b=$('btn-lu');b.disabled=true;b.textContent='מחפש...';
  try{
    const r=await fetch('/api/license-plate?plate='+p);
    const d=await r.json();
    if(d.error){
      $('plate-res').innerHTML='<div class="alert alert-e">'+d.error+'</div>';
      $('plate-res').classList.remove('hid');S.vehicle=null;chk1();return;
    }
    S.vehicle={make:d.en_make||d.tozeret_nm,model:d.en_model||d.kinuy_mishari,year:String(d.shnat_yitzur),plate:d};
    let h='<div class="pr"><div class="alert alert-s">רכב נמצא!</div>';
    h+=`<div class="f"><span class="fl">יצרן:</span>${d.tozeret_nm}${d.en_make?' ('+d.en_make+')':''}</div>`;
    h+=`<div class="f"><span class="fl">דגם:</span>${d.kinuy_mishari}${d.en_model?' ('+d.en_model+')':''}</div>`;
    h+=`<div class="f"><span class="fl">שנת ייצור:</span>${d.shnat_yitzur}</div>`;
    if(d.sug_delek_nm)h+=`<div class="f"><span class="fl">סוג דלק:</span>${d.sug_delek_nm}</div>`;
    if(d.tzeva_rechev)h+=`<div class="f"><span class="fl">צבע:</span>${d.tzeva_rechev}</div>`;
    if(d.tokef_dt)h+=`<div class="f"><span class="fl">תוקף רישיון:</span>${d.tokef_dt}</div>`;
    // Check if in DB
    const inDb = DB && DB[S.vehicle.make] && DB[S.vehicle.make][S.vehicle.model] && DB[S.vehicle.make][S.vehicle.model][S.vehicle.year];
    if(!inDb)h+='<div class="alert alert-i" style="margin-top:12px">הרכב זוהה, אך אין מידע על תקלות ספציפיות לדגם זה במסד הנתונים. ניתן להמשיך עם הזנה ידנית.</div>';
    h+='</div>';
    $('plate-res').innerHTML=h;$('plate-res').classList.remove('hid');chk1();
  }catch(e){
    $('plate-res').innerHTML='<div class="alert alert-e">שגיאה: '+e.message+'</div>';
    $('plate-res').classList.remove('hid');
  }finally{b.disabled=false;b.textContent='חפש';}
}
function populateMakes(){
  if(!DB)return;const s=$('s-make');
  Object.keys(DB).sort().forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;s.appendChild(o);});
}
function onMake(){
  const mk=$('s-make').value,sm=$('s-model'),sy=$('s-year');
  sm.innerHTML='<option value="">בחר דגם...</option>';sy.innerHTML='<option value="">בחר שנה...</option>';
  sm.disabled=!mk;sy.disabled=true;S.vehicle=null;chk1();
  if(!mk||!DB[mk])return;
  Object.keys(DB[mk]).sort().forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;sm.appendChild(o);});
}
function onModel(){
  const mk=$('s-make').value,md=$('s-model').value,sy=$('s-year');
  sy.innerHTML='<option value="">בחר שנה...</option>';sy.disabled=!md;S.vehicle=null;chk1();
  if(!mk||!md||!DB[mk]||!DB[mk][md])return;
  Object.keys(DB[mk][md]).sort((a,b)=>b-a).forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent=y;sy.appendChild(o);});
}
function onYear(){
  const mk=$('s-make').value,md=$('s-model').value,yr=$('s-year').value;
  if(yr)S.vehicle={make:mk,model:md,year:yr};else S.vehicle=null;chk1();
}
function chk1(){$('btn1').disabled=!S.vehicle;}

// ── Step 2 ─────────────────────────────────────────────────────────────────
function goStep2(){
  if(!S.vehicle)return;goStep(2);
  const v=S.vehicle;
  $('v-sum').innerHTML=`<div class="alert alert-i"><strong>${v.make} ${v.model} ${v.year}</strong>${v.plate?' | '+v.plate.tozeret_nm+' '+v.plate.kinuy_mishari:''}</div>`;
  S.systems = findVehicleIssues(v.make, v.model, v.year);
  renderSystems();
}
function findVehicleIssues(make, model, year) {
  if (!DB || !DB[make]) return getGenericIssues();
  // 1. Exact match
  if (DB[make][model] && DB[make][model][year]) return DB[make][model][year];
  // 2. Same model, closest year
  if (DB[make][model]) {
    const years = Object.keys(DB[make][model]).map(Number).sort((a,b)=>Math.abs(a-year)-Math.abs(b-year));
    if (years.length) return DB[make][model][String(years[0])];
  }
  // 3. Similar model name (partial match)
  const modelLower = model.toLowerCase();
  for (const m of Object.keys(DB[make])) {
    if (m.toLowerCase().includes(modelLower) || modelLower.includes(m.toLowerCase())) {
      const yrs = Object.keys(DB[make][m]).sort((a,b)=>Math.abs(Number(a)-year)-Math.abs(Number(b)-year));
      if (yrs.length) return DB[make][m][yrs[0]];
    }
  }
  // 4. Any model from same make, closest year
  const allModels = Object.keys(DB[make]);
  if (allModels.length) {
    let best = null, bestDiff = 9999;
    for (const m of allModels) {
      for (const y of Object.keys(DB[make][m])) {
        const diff = Math.abs(Number(y) - year);
        if (diff < bestDiff) { bestDiff = diff; best = DB[make][m][y]; }
      }
    }
    if (best) return best;
  }
  return getGenericIssues();
}
function getGenericIssues() {
  return {
    engine: ["רעש חריג מהמנוע","דליפת שמן","חוסר כוח בעליות","צריכת דלק מוגברת","רעידות בסיבובים נמוכים"],
    brakes: ["רעש בבלמים","רעידות בעת בלימה","דוושת בלם רכה","בלאי מוקדם של רפידות"],

function renderSystems(){
  const g=$('sys-grid');g.innerHTML='';
  SYS_ORDER.forEach(k=>{
    const info=SYS_INFO[k],issues=S.systems[k]||[];
    const d=document.createElement('div');d.className='sc2'+(S.selSys===k?' sel':'');
    d.innerHTML=`<div class="ic">${info.ic}</div><div class="nm">${info.he}</div><div class="cn">${issues.length} בעיות</div>`;
    d.onclick=()=>selSys(k);g.appendChild(d);
  });
}
function selSys(k){
  S.selSys=k;S.selIssue=null;S.selIdx=null;renderSystems();
  const issues=S.systems[k]||[];
  if(!issues.length){$('iss-sec').classList.add('hid');chk2();return;}
  $('iss-t').textContent='בעיות שכיחות — '+SYS_INFO[k].he+':';
  const l=$('iss-list');l.innerHTML='';
  issues.forEach((iss,i)=>{
    const d=document.createElement('div');d.className='ii';
    d.innerHTML=`<div class="in">${i+1}</div><div>${iss}</div>`;
    d.onclick=()=>selIss(k,iss,i);l.appendChild(d);
  });
  $('iss-sec').classList.remove('hid');chk2();
}
function selIss(sys,iss,idx){
  S.selSys=sys;S.selIssue=iss;S.selIdx=idx;
  document.querySelectorAll('.ii').forEach((el,i)=>el.classList.toggle('sel',i===idx));chk2();
}
function onSearch(){
  const q=$('iss-q').value.trim(),el=$('ac-list');
  if(!q||!S.systems){el.classList.add('hid');return;}
  const items=[];
  SYS_ORDER.forEach(k=>{(S.systems[k]||[]).forEach((iss,i)=>{if(iss.includes(q))items.push({sys:k,iss,idx:i});});});
  if(!items.length){el.classList.add('hid');return;}
  el.innerHTML='';items.slice(0,10).forEach(it=>{
    const d=document.createElement('div');d.className='aci';
    d.innerHTML=`<span class="sb2">${SYS_INFO[it.sys].ic} ${SYS_INFO[it.sys].he}</span>${it.iss}`;
    d.onclick=()=>{selIss(it.sys,it.iss,it.idx);selSys(it.sys);$('iss-q').value=it.iss;el.classList.add('hid');};
    el.appendChild(d);
  });el.classList.remove('hid');
}
function chk2(){$('btn2').disabled=!S.selIssue;}

function renderSop(){
